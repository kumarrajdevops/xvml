<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard</title>

<style>*,*::before,*::after{box-sizing:border-box}
body{margin:0}

/* ── Custom properties (light defaults) ── */
:root{
  --vml-color-primary:#6366f1;
  --vml-color-primary-hover:#4f46e5;
  --vml-color-bg:#f1f5f9;
  --vml-color-surface:#ffffff;
  --vml-color-border:#e2e8f0;
  --vml-color-text:#0f172a;
  --vml-color-text-muted:#64748b;
  --vml-color-text-label:#374151;
  --vml-color-success:#22c55e;
  --vml-color-success-bg:#dcfce7;
  --vml-color-success-text:#166534;
  --vml-color-warning:#f59e0b;
  --vml-color-warning-bg:#fef9c3;
  --vml-color-warning-text:#854d0e;
  --vml-color-error:#ef4444;
  --vml-color-error-bg:#fee2e2;
  --vml-color-error-text:#991b1b;
  --vml-color-info-bg:#dbeafe;
  --vml-color-info-text:#1e40af;
  --vml-font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --vml-mono:'Courier New',Courier,monospace;
  --vml-radius:10px;
  --vml-radius-sm:6px;
  --vml-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
}

/* ── Auto dark mode (no explicit theme class) ── */
@media(prefers-color-scheme:dark){
  :root{
    --vml-color-bg:#0f172a;
    --vml-color-surface:#1e293b;
    --vml-color-border:#334155;
    --vml-color-text:#f1f5f9;
    --vml-color-text-muted:#94a3b8;
    --vml-color-text-label:#cbd5e1;
    --vml-shadow:0 1px 3px rgba(0,0,0,.3);
  }
}

/* ── Explicit theme overrides (beat the media query via inheritance) ── */
.vml-theme-light{
  --vml-color-bg:#f1f5f9;
  --vml-color-surface:#ffffff;
  --vml-color-border:#e2e8f0;
  --vml-color-text:#0f172a;
  --vml-color-text-muted:#64748b;
  --vml-color-text-label:#374151;
  --vml-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
}
.vml-theme-dark{
  --vml-color-bg:#0f172a;
  --vml-color-surface:#1e293b;
  --vml-color-border:#334155;
  --vml-color-text:#f1f5f9;
  --vml-color-text-muted:#94a3b8;
  --vml-color-text-label:#cbd5e1;
  --vml-shadow:0 1px 3px rgba(0,0,0,.3);
}

/* ── Page shell ── */
.vml-page{
  min-height:100vh;
  padding:24px 20px;
  max-width:960px;
  margin:0 auto;
  background:var(--vml-color-bg);
  color:var(--vml-color-text);
  font-family:var(--vml-font);
  font-size:16px;
  line-height:1.5;
}

/* ── Navigation ── */
.vml-nav{
  background:var(--vml-color-surface);
  border-radius:var(--vml-radius);
  border:1px solid var(--vml-color-border);
  padding:0 20px;
  margin-bottom:20px;
  box-shadow:var(--vml-shadow);
}
.vml-nav__links{
  display:flex;
  list-style:none;
  padding:0;
  margin:0;
  gap:4px;
  flex-wrap:wrap;
}
.vml-nav__link{
  display:block;
  padding:14px 10px;
  color:var(--vml-color-text-muted);
  text-decoration:none;
  font-size:14px;
  font-weight:500;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
}
.vml-nav__link:first-child{color:var(--vml-color-primary);border-bottom-color:var(--vml-color-primary)}
.vml-nav__link:hover{color:var(--vml-color-text);border-bottom-color:var(--vml-color-border)}

/* ── Card ── */
.vml-card{
  background:var(--vml-color-surface);
  border-radius:var(--vml-radius);
  box-shadow:var(--vml-shadow);
  border:1px solid var(--vml-color-border);
  padding:24px;
  margin-bottom:20px;
}
.vml-card--flat{box-shadow:none}
.vml-card--outlined{box-shadow:none}
.vml-card--compact{padding:16px}
.vml-card__label{font-size:16px;font-weight:600;margin:0 0 20px;color:var(--vml-color-text)}
.vml-card__body{}

/* ── Section ── */
.vml-section{margin-bottom:16px}
.vml-section--divided{border-top:1px solid var(--vml-color-border);padding-top:16px}
.vml-section__label{
  font-size:11px;font-weight:700;color:var(--vml-color-text-muted);
  text-transform:uppercase;letter-spacing:.08em;margin:0 0 12px
}
.vml-section__body{}

/* ── Layout ── */
.vml-layout{display:block}
.vml-layout--inline{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.vml-layout--grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.vml-layout--center{display:flex;justify-content:center;align-items:center}
.vml-layout--fill{display:flex;flex-direction:column;flex:1}

/* ── Cols ── */
.vml-cols{display:grid;gap:16px}
.vml-cols--1{grid-template-columns:1fr}
.vml-cols--2{grid-template-columns:repeat(2,1fr)}
.vml-cols--3{grid-template-columns:repeat(3,1fr)}
.vml-cols--4{grid-template-columns:repeat(4,1fr)}
.vml-cols--5{grid-template-columns:repeat(5,1fr)}
.vml-cols--6{grid-template-columns:repeat(6,1fr)}
.vml-col{}

/* ── Avatar ── */
.vml-avatar{
  width:60px;height:60px;border-radius:50%;
  background:var(--vml-color-primary);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;margin-bottom:16px;
  letter-spacing:-0.5px;user-select:none;flex-shrink:0;
}

/* ── Title ── */
.vml-title{margin:0 0 6px;font-weight:700;line-height:1.2;color:var(--vml-color-text)}
.vml-title--xl{font-size:32px}
.vml-title--lg{font-size:24px}
.vml-title--md{font-size:20px}
.vml-title--sm{font-size:16px}

/* ── Subtitle ── */
.vml-subtitle{margin:0 0 20px;font-size:15px;color:var(--vml-color-text-muted)}
.vml-subtitle--muted{opacity:.75}

/* ── Text ── */
.vml-text{margin:0 0 12px;line-height:1.65;color:var(--vml-color-text)}
.vml-text--sm{font-size:13px}
.vml-text--muted{color:var(--vml-color-text-muted)}
.vml-text--bold{font-weight:600}
.vml-text--mono{font-family:var(--vml-mono)}
.vml-text--error{color:var(--vml-color-error)}
.vml-text--success{color:var(--vml-color-success)}

/* ── Divider ── */
.vml-divider{border:none;border-top:1px solid var(--vml-color-border);margin:20px 0}
.vml-divider--dashed{border-top-style:dashed}
.vml-divider--thick{border-top-width:2px}
.vml-divider--spacious{margin:32px 0}
.vml-divider--text{
  display:flex;align-items:center;gap:12px;
  margin:20px 0;color:var(--vml-color-text-muted);font-size:13px;
  border:none;
}
.vml-divider__line{flex:1;height:1px;background:var(--vml-color-border)}
.vml-divider__text{white-space:nowrap}

/* ── Badge ── */
.vml-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500}
.vml-badge--neutral{background:var(--vml-color-border);color:var(--vml-color-text-label)}
.vml-badge--success{background:var(--vml-color-success-bg);color:var(--vml-color-success-text)}
.vml-badge--warning{background:var(--vml-color-warning-bg);color:var(--vml-color-warning-text)}
.vml-badge--error{background:var(--vml-color-error-bg);color:var(--vml-color-error-text)}
.vml-badge--info{background:var(--vml-color-info-bg);color:var(--vml-color-info-text)}

/* ── Field ── */
.vml-field{margin-bottom:16px}
.vml-field__label{
  display:block;font-size:13px;font-weight:500;
  margin-bottom:5px;color:var(--vml-color-text-label)
}
.vml-field__input,.vml-field__textarea{
  display:block;width:100%;padding:9px 12px;
  border:1px solid var(--vml-color-border);border-radius:var(--vml-radius-sm);
  font-size:14px;color:var(--vml-color-text);background:var(--vml-color-surface);
  font-family:var(--vml-font);transition:border-color .15s,box-shadow .15s;
}
.vml-field__input:focus,.vml-field__textarea:focus{
  outline:none;border-color:var(--vml-color-primary);
  box-shadow:0 0 0 3px rgba(99,102,241,.15);
}
.vml-field__textarea{min-height:80px;resize:vertical}

/* ── Button ── */
.vml-button{
  display:inline-flex;align-items:center;justify-content:center;
  padding:9px 18px;border:1px solid transparent;
  border-radius:var(--vml-radius-sm);font-size:14px;font-weight:500;
  cursor:pointer;font-family:var(--vml-font);transition:opacity .15s,background .15s;
  text-decoration:none;
}
.vml-button--default{background:var(--vml-color-surface);border-color:var(--vml-color-border);color:var(--vml-color-text-label)}
.vml-button--primary{background:var(--vml-color-primary);color:#fff;border-color:var(--vml-color-primary)}
.vml-button--primary:hover{background:var(--vml-color-primary-hover)}
.vml-button--secondary{background:var(--vml-color-surface);border-color:var(--vml-color-border);color:var(--vml-color-text)}
.vml-button--danger{background:var(--vml-color-error);color:#fff;border-color:var(--vml-color-error)}
.vml-button--ghost{background:transparent;color:var(--vml-color-primary);border-color:transparent}
.vml-button--link{background:transparent;border-color:transparent;color:var(--vml-color-primary);text-decoration:underline;padding:0}
.vml-button--sm{padding:5px 12px;font-size:12px}
.vml-button--lg{padding:12px 24px;font-size:16px}
.vml-button--full{width:100%}
.vml-button:disabled{opacity:.5;cursor:not-allowed}

/* ── Checkbox ── */
.vml-checkbox{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:var(--vml-color-text)}
.vml-checkbox__input{width:16px;height:16px;accent-color:var(--vml-color-primary)}

/* ── Select ── */
.vml-select{margin-bottom:16px}
.vml-select__label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;color:var(--vml-color-text-label)}
.vml-select__input{
  display:block;width:100%;padding:9px 12px;
  border:1px solid var(--vml-color-border);border-radius:var(--vml-radius-sm);
  font-size:14px;color:var(--vml-color-text);background:var(--vml-color-surface);
  font-family:var(--vml-font);
}

/* ── Link ── */
.vml-link{display:inline-block;margin-top:4px;color:var(--vml-color-primary);text-decoration:none;font-size:14px}
.vml-link:hover{text-decoration:underline}

/* ── Stats grid ── */
.vml-stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:16px;
  margin-bottom:20px;
}
.vml-stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px}

/* ── Stat ── */
.vml-stat{
  padding:20px;background:var(--vml-color-surface);
  border-radius:var(--vml-radius);border:1px solid var(--vml-color-border);
  box-shadow:var(--vml-shadow);
}
.vml-stat__value{display:block;font-size:28px;font-weight:700;color:var(--vml-color-text);line-height:1}
.vml-stat__label{
  display:block;font-size:13px;color:var(--vml-color-text-muted);
  margin-top:4px;
}
.vml-stat__trend{font-size:13px;margin-left:4px}
.vml-stat__trend--up{color:var(--vml-color-success)}
.vml-stat__trend--down{color:var(--vml-color-error)}
.vml-stat__trend--neutral{color:var(--vml-color-text-muted)}

/* ── Table ── */
.vml-table-wrapper{overflow-x:auto;margin-bottom:16px}
.vml-table{width:100%;border-collapse:collapse;font-size:14px}
.vml-table th{
  padding:10px 14px;text-align:left;font-weight:600;font-size:12px;
  text-transform:uppercase;letter-spacing:.04em;
  border-bottom:2px solid var(--vml-color-border);color:var(--vml-color-text-muted)
}
.vml-table td{padding:12px 14px;border-bottom:1px solid var(--vml-color-border);color:var(--vml-color-text)}
.vml-table--striped tbody tr:nth-child(even) td{background:var(--vml-color-bg)}
.vml-table--compact th,.vml-table--compact td{padding:6px 10px}
.vml-table--bordered th,.vml-table--bordered td{border:1px solid var(--vml-color-border)}

/* ── Progress ── */
.vml-progress{margin-bottom:16px}
.vml-progress__header{display:flex;justify-content:space-between;margin-bottom:6px}
.vml-progress__label{font-size:14px;font-weight:500;color:var(--vml-color-text)}
.vml-progress__value{font-size:13px;color:var(--vml-color-text-muted)}
.vml-progress__track{background:var(--vml-color-border);border-radius:9999px;height:8px}
.vml-progress__fill{height:8px;border-radius:9999px;background:var(--vml-color-primary)}
.vml-progress__fill--success{background:var(--vml-color-success)}
.vml-progress__fill--warning{background:var(--vml-color-warning)}
.vml-progress__fill--error{background:var(--vml-color-error)}

/* ── List ── */
.vml-list{padding-left:20px;margin:0 0 12px}
.vml-list--unordered{list-style:disc}
.vml-list--ordered{list-style:decimal}
.vml-list--check{list-style:none;padding-left:0}
.vml-list--check .vml-list__item::before{content:"✓ ";color:var(--vml-color-success);font-weight:700}
.vml-list__item{padding:3px 0;line-height:1.6}

/* ── Codeblock ── */
.vml-codeblock{margin-bottom:16px;border-radius:var(--vml-radius);overflow:hidden;border:1px solid var(--vml-color-border)}
.vml-codeblock__header{
  display:flex;align-items:center;gap:8px;padding:8px 14px;
  background:var(--vml-color-bg);border-bottom:1px solid var(--vml-color-border);font-size:12px
}
.vml-codeblock__lang{font-weight:600;color:var(--vml-color-primary);font-family:var(--vml-mono)}
.vml-codeblock__filename{color:var(--vml-color-text-muted)}
.vml-codeblock__pre{margin:0;padding:16px;background:#1e293b;overflow-x:auto}
.vml-codeblock__code{font-family:var(--vml-mono);font-size:13px;color:#e2e8f0;white-space:pre}

/* ── Constraint ── */
.vml-constraint{
  display:flex;align-items:flex-start;gap:10px;padding:12px 14px;
  border-radius:var(--vml-radius-sm);margin-bottom:8px;
  background:var(--vml-color-bg);border-left:3px solid var(--vml-color-primary)
}
.vml-constraint--must{border-left-color:var(--vml-color-error)}
.vml-constraint--should{border-left-color:var(--vml-color-warning)}
.vml-constraint--may{border-left-color:var(--vml-color-success)}
.vml-constraint__severity{
  font-size:10px;font-weight:800;padding:2px 6px;border-radius:3px;
  white-space:nowrap;background:var(--vml-color-error);color:#fff;flex-shrink:0;margin-top:1px;
}
.vml-constraint--should .vml-constraint__severity{background:var(--vml-color-warning)}
.vml-constraint--may .vml-constraint__severity{background:var(--vml-color-success)}
.vml-constraint__name{font-weight:600;font-family:var(--vml-mono);font-size:13px;flex-shrink:0;color:var(--vml-color-text)}
.vml-constraint__desc{margin:0;font-size:14px;color:var(--vml-color-text-muted);flex:1}

/* ── Alert ── */
.vml-alert{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 14px;border-radius:var(--vml-radius-sm);margin-bottom:12px;
  border:1px solid transparent;
}
.vml-alert--info{background:var(--vml-color-info-bg);color:var(--vml-color-info-text);border-color:rgba(30,64,175,.2)}
.vml-alert--success{background:var(--vml-color-success-bg);color:var(--vml-color-success-text);border-color:rgba(22,101,52,.2)}
.vml-alert--warning{background:var(--vml-color-warning-bg);color:var(--vml-color-warning-text);border-color:rgba(133,77,14,.2)}
.vml-alert--error{background:var(--vml-color-error-bg);color:var(--vml-color-error-text);border-color:rgba(153,27,27,.2)}
.vml-alert__icon{font-size:15px;flex-shrink:0;margin-top:1px}
.vml-alert__message{font-size:14px;font-weight:500;line-height:1.5}

/* ── Responsive ── */
@media(max-width:640px){
  .vml-page{padding:16px 12px}
  .vml-cols--2,.vml-cols--3,.vml-cols--4,.vml-cols--5,.vml-cols--6{
    grid-template-columns:1fr
  }
  .vml-stats{grid-template-columns:repeat(2,1fr)}
  .vml-stat-row{grid-template-columns:repeat(2,1fr)}
  .vml-stat__value{font-size:22px}
  .vml-nav__links{gap:0}
}</style>
</head>
<body class="vml-page">
<nav class="vml-nav"><ul class="vml-nav__links"><li><a class="vml-nav__link" href="#">Home</a></li><li><a class="vml-nav__link" href="#">Projects</a></li><li><a class="vml-nav__link" href="#">Settings</a></li></ul></nav><div class="vml-stats"><div class="vml-stat"><span class="vml-stat__value">1,240</span><span class="vml-stat__label">Total users</span></div><div class="vml-stat"><span class="vml-stat__value">98%</span><span class="vml-stat__label">Uptime</span></div><div class="vml-stat"><span class="vml-stat__value">42</span><span class="vml-stat__label">Open issues</span></div></div><section class="vml-card"><div class="vml-card__body"><h1 class="vml-title vml-title--lg">Recent activity</h1><div class="vml-alert vml-alert--info" role="alert"><span class="vml-alert__icon">ℹ</span><span class="vml-alert__message">Deployment succeeded 2 min ago</span></div><div class="vml-alert vml-alert--warning" role="alert"><span class="vml-alert__icon">⚠</span><span class="vml-alert__message">SSL cert expires in 7 days</span></div></div></section>
</body>
</html>
