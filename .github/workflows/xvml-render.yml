name: Render XVML

on:
  push:
    paths:
      - '**.xvml'

# Only fires on .xvml pushes — bot HTML commits never re-trigger it.

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── 1. Install published CLI ───────────────────────────────────────────
      - name: Install @xvml/cli
        run: npm install -g @xvml/cli

      # ── 2. Render all .xvml files ─────────────────────────────────────────
      - name: Render
        run: xvml build

      # ── 3. sha256-gate: commit only HTML whose content actually changed ────
      - name: Commit changed HTML
        run: |
          git config user.name  "xvml-bot"
          git config user.email "xvml-bot@users.noreply.github.com"

          staged=()

          for html in docs/*.html; do
            [ -f "$html" ] || continue

            new_hash=$(sha256sum "$html" | cut -d' ' -f1)
            old_hash=$(git show "HEAD:${html}" 2>/dev/null | sha256sum | cut -d' ' -f1 || echo "")

            if [ "$new_hash" != "$old_hash" ]; then
              git add "$html"
              staged+=("$(basename "$html")")
              echo "staged: $html"
            else
              echo "unchanged: $html"
            fi
          done

          if [ ${#staged[@]} -eq 0 ]; then
            echo "Nothing to commit."
            exit 0
          fi

          label=$(IFS=', '; echo "${staged[*]}")
          git commit -m "render: $label"
          git push
